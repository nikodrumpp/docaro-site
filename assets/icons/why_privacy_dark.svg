<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180" width="100%" height="100%">

  <!-- Ambient glow rings -->
  <circle cx="160" cy="92" r="78" fill="none" stroke="#34D399" stroke-width="0.5" stroke-opacity="0.12"/>
  <circle cx="160" cy="92" r="58" fill="none" stroke="#34D399" stroke-width="0.5" stroke-opacity="0.10"/>
  <circle cx="160" cy="92" r="38" fill="#34D399" opacity="0.05"/>

  <!-- Shield body -->
  <path d="M90,40 C90,40 108,32 160,22 C212,32 230,40 230,40 L230,100 C230,136 200,158 160,170 C120,158 90,136 90,100 Z"
        fill="#0D2018" stroke="#34D399" stroke-width="1.5" stroke-opacity="0.65"/>

  <!-- Shield top highlight -->
  <path d="M90,40 C90,40 108,32 160,22 C212,32 230,40 230,40"
        fill="none" stroke="#34D399" stroke-width="1" stroke-opacity="0.35"/>

  <!-- Shield inner glow layer -->
  <path d="M100,48 C100,48 115,41 160,32 C205,41 220,48 220,48 L220,100 C220,130 196,150 160,160 C124,150 100,130 100,100 Z"
        fill="#34D399" opacity="0.04"/>

  <!-- Lock body -->
  <rect x="138" y="100" width="44" height="36" rx="9" fill="#34D399" opacity="0.88"/>

  <!-- Lock shackle -->
  <path d="M146,100 L146,84 C146,73 174,73 174,84 L174,100"
        fill="none" stroke="#34D399" stroke-width="3" stroke-linecap="round"/>

  <!-- Keyhole -->
  <circle cx="160" cy="118" r="5" fill="#0D2018"/>
  <rect x="157.5" y="120" width="5" height="8" rx="2.5" fill="#0D2018"/>

  <!-- Corner accent dots -->
  <circle cx="96" cy="42" r="3" fill="#34D399" opacity="0.35"/>
  <circle cx="224" cy="42" r="3" fill="#34D399" opacity="0.35"/>
  <circle cx="248" cy="68" r="4" fill="#34D399" opacity="0.10"/>
  <circle cx="72" cy="120" r="5" fill="#34D399" opacity="0.08"/>

  <!-- Label -->
  <text x="160" y="178" text-anchor="middle" font-size="9" fill="#34D399" opacity="0.5"
        font-family="-apple-system,sans-serif" font-weight="600" letter-spacing="0.10em">YOUR DATA ONLY</text>
</svg>
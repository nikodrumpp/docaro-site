<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180" width="100%" height="100%">
  <defs>
    <filter id="gRed" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="calBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E1E2E"/>
      <stop offset="100%" stop-color="#16162A"/>
    </linearGradient>
  </defs>

  <!-- Calendar body -->
  <rect x="80" y="18" width="160" height="148" rx="12" fill="url(#calBody)" stroke="#EF4444" stroke-width="1" stroke-opacity="0.30"/>

  <!-- Header -->
  <rect x="80" y="18" width="160" height="36" rx="12" fill="#2A1A1A"/>
  <rect x="80" y="40" width="160" height="14" fill="#2A1A1A"/>

  <!-- Ring pegs -->
  <rect x="120" y="10" width="8" height="20" rx="4" fill="#48484A"/>
  <rect x="152" y="10" width="8" height="20" rx="4" fill="#48484A"/>
  <rect x="184" y="10" width="8" height="20" rx="4" fill="#48484A"/>

  <!-- Month label placeholder -->
  <rect x="112" y="26" width="56" height="5" rx="2.5" fill="#F5F5F7" opacity="0.35"/>
  <rect x="200" y="25" width="28" height="7" rx="3.5" fill="#EF4444" opacity="0.80"/>

  <!-- Day headers -->
  <g fill="#48484A" opacity="0.55">
    <rect x="91" y="60" width="12" height="3" rx="1.5"/>
    <rect x="111" y="60" width="12" height="3" rx="1.5"/>
    <rect x="131" y="60" width="12" height="3" rx="1.5"/>
    <rect x="151" y="60" width="12" height="3" rx="1.5"/>
    <rect x="171" y="60" width="12" height="3" rx="1.5"/>
    <rect x="191" y="60" width="12" height="3" rx="1.5"/>
    <rect x="211" y="60" width="12" height="3" rx="1.5"/>
  </g>
  <line x1="88" y1="66" x2="232" y2="66" stroke="#48484A" stroke-width="0.5" opacity="0.4"/>

  <!-- Date row 1 -->
  <g fill="#636366" opacity="0.45">
    <circle cx="97" cy="78" r="5"/>
    <circle cx="117" cy="78" r="5"/>
    <circle cx="137" cy="78" r="5"/>
    <circle cx="157" cy="78" r="5"/>
    <circle cx="177" cy="78" r="5"/>
    <circle cx="197" cy="78" r="5"/>
    <circle cx="217" cy="78" r="5"/>
  </g>

  <!-- Date row 2 -->
  <g fill="#636366" opacity="0.45">
    <circle cx="97" cy="96" r="5"/>
    <circle cx="117" cy="96" r="5"/>
    <circle cx="137" cy="96" r="5"/>
    <circle cx="157" cy="96" r="5"/>
    <circle cx="177" cy="96" r="5"/>
    <circle cx="197" cy="96" r="5"/>
    <circle cx="217" cy="96" r="5"/>
  </g>

  <!-- Date row 3 — one missed (crossed out) -->
  <g fill="#636366" opacity="0.45">
    <circle cx="97" cy="114" r="5"/>
    <circle cx="117" cy="114" r="5"/>
    <circle cx="137" cy="114" r="5"/>
  </g>
  <!-- Missed date highlight -->
  <circle cx="157" cy="114" r="14" fill="#EF4444" opacity="0.12" filter="url(#gRed)"/>
  <circle cx="157" cy="114" r="9" fill="#1C0A0A" stroke="#EF4444" stroke-width="1.25" stroke-opacity="0.7"/>
  <line x1="153" y1="110" x2="161" y2="118" stroke="#EF4444" stroke-width="1.75" stroke-linecap="round" stroke-opacity="0.9"/>
  <line x1="161" y1="110" x2="153" y2="118" stroke="#EF4444" stroke-width="1.75" stroke-linecap="round" stroke-opacity="0.9"/>
  <g fill="#636366" opacity="0.45">
    <circle cx="177" cy="114" r="5"/>
    <circle cx="197" cy="114" r="5"/>
    <circle cx="217" cy="114" r="5"/>
  </g>

  <!-- Date row 4 (faded) -->
  <g fill="#636366" opacity="0.28">
    <circle cx="97" cy="132" r="5"/>
    <circle cx="117" cy="132" r="5"/>
    <circle cx="137" cy="132" r="5"/>
    <circle cx="157" cy="132" r="5"/>
    <circle cx="177" cy="132" r="5"/>
  </g>

  <!-- Warning dot bottom right -->
  <circle cx="218" cy="156" r="10" fill="#EF4444" opacity="0.90" filter="url(#gRed)"/>
  <rect x="216" y="149" width="4" height="8" rx="2" fill="#FFF" opacity="0.95"/>
  <circle cx="218" cy="160" r="2" fill="#FFF" opacity="0.95"/>
</svg>
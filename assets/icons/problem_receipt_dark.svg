  <!-- Wavy bottom tear -->
  <path d="M110,178 Q116,172 122,178 Q128,184 134,176 Q140,170 146,177 Q152,184 158,175 Q164,168 170,176 Q176,183 182,174 Q188,167 194,175 Q200,182 206,173 Q212,166 218,174 Q224,181 230,172 Q234,166 238,174 L238,180 L110,180 Z"
        fill="#E0DDD4"/>
</svg>
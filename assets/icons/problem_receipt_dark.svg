  <rect x="110" y="12" width="128" height="14" rx="6" fill="#E0DDD4"/>
  <!-- Receipt content -->
  <rect x="122" y="36" width="72" height="5" rx="2.5" fill="#1C1C1E" opacity="0.52"/>
  <rect x="122" y="48" width="52" height="3.5" rx="1.75" fill="#636366" opacity="0.42"/>
  <line x1="118" y1="58" x2="230" y2="58" stroke="#C0BBB2" stroke-width="0.75" opacity="0.55"/>
  <rect x="122" y="65" width="60" height="3" rx="1.5" fill="#3A3A3C" opacity="0.48"/>
  <rect x="194" y="65" width="32" height="3" rx="1.5" fill="#3A3A3C" opacity="0.48"/>
  <rect x="122" y="74" width="48" height="3" rx="1.5" fill="#636366" opacity="0.38"/>
  <rect x="194" y="74" width="26" height="3" rx="1.5" fill="#636366" opacity="0.38"/>
  <rect x="122" y="83" width="54" height="3" rx="1.5" fill="#636366" opacity="0.35"/>
  <rect x="194" y="83" width="28" height="3" rx="1.5" fill="#636366" opacity="0.35"/>
  <rect x="122" y="92" width="42" height="3" rx="1.5" fill="#636366" opacity="0.32"/>
  <rect x="194" y="92" width="22" height="3" rx="1.5" fill="#636366" opacity="0.32"/>
  <line x1="118" y1="102" x2="230" y2="102" stroke="#C0BBB2" stroke-width="0.75" opacity="0.55"/>
  <rect x="122" y="109" width="44" height="5" rx="2.5" fill="#1C1C1E" opacity="0.5"/>
  <rect x="180" y="107" width="44" height="10" rx="5" fill="#1C1C1E" opacity="0.45"/>
  <!-- Barcode -->

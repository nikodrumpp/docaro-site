<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180" width="100%" height="100%">
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5F3EE"/>
      <stop offset="100%" stop-color="#E8E4DB"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="6" stdDeviation="14" flood-color="#000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- Receipt 1 — back, most tilted, faded -->
  <g transform="rotate(12, 90, 95)" opacity="0.35">
    <rect x="28" y="28" width="120" height="154" rx="5" fill="url(#paper)"/>
    <rect x="28" y="28" width="120" height="12" rx="5" fill="#DDD9D0"/>
    <rect x="38" y="50" width="68" height="4" rx="2" fill="#1C1C1E" opacity="0.4"/>
    <rect x="38" y="60" width="48" height="3" rx="1.5" fill="#636366" opacity="0.35"/>
    <rect x="38" y="70" width="58" height="3" rx="1.5" fill="#636366" opacity="0.3"/>
    <rect x="38" y="80" width="44" height="3" rx="1.5" fill="#636366" opacity="0.28"/>
  </g>

  <!-- Receipt 2 — middle -->
  <g transform="rotate(-6, 160, 90)" opacity="0.6">

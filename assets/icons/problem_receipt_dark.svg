    <rect x="110" y="70" width="44" height="3" rx="1.5" fill="#636366" opacity="0.3"/>
    <line x1="106" y1="82" x2="212" y2="82" stroke="#C0BBB2" stroke-width="0.75" opacity="0.5"/>
    <rect x="110" y="90" width="36" height="6" rx="3" fill="#1C1C1E" opacity="0.45"/>
    <rect x="166" y="88" width="38" height="10" rx="5" fill="#1C1C1E" opacity="0.4"/>
  </g>

  <!-- Main receipt — front, slightly crumpled -->
  <g filter="url(#shadow)">

    <rect x="137" y="131" width="2" height="22"/><rect x="141" y="131" width="4" height="22"/>
    <rect x="147" y="131" width="1" height="22"/><rect x="150" y="131" width="2" height="22"/>
    <rect x="154" y="131" width="3" height="22"/><rect x="159" y="131" width="1" height="22"/>
    <rect x="162" y="131" width="2" height="22"/><rect x="166" y="131" width="3" height="22"/>
    <rect x="171" y="131" width="1" height="22"/><rect x="174" y="131" width="2" height="22"/>
    <rect x="178" y="131" width="4" height="22"/><rect x="184" y="131" width="1" height="22"/>
    <rect x="187" y="131" width="2" height="22"/><rect x="191" y="131" width="3" height="22"/>
